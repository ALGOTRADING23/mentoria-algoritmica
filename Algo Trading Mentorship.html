document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0%, #000 30%, transparent 90%);\n  }\n  .vignette {\n    position: fixed; inset: 0; pointer-events: none; z-index: 1;\n    background:\n      radial-gradient(ellipse 60% 50% at 80% 0%, rgba(20,224,122,0.08), transparent 60%),\n      radial-gradient(ellipse 50% 40% at 0% 100%, rgba(197,255,61,0.05), transparent 60%);\n  }\n\n  /* NAV */\n  nav.top {\n    position: fixed; top: 0; left: 0; right: 0; z-index: 50;\n    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);\n    background: rgba(6,7,8,0.6);\n    border-bottom: 1px solid var(--border);\n  }\n  nav.top .inner {\n    max-width: 1320px; margin: 0 auto; padding: 14px 32px;\n    display: flex; align-items: center; justify-content: space-between; gap: 24px;\n  }\n  .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; letter-spacing: -0.01em; }\n  .brand-mark {\n    width: 28px; height: 28px; display: grid; place-items: center;\n    background: var(--text); color: var(--bg); border-radius: 6px;\n    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px;\n  }\n  .nav-links { display: flex; gap: 28px; font-size: 14px; color: var(--text-dim); }\n  .nav-links a { color: inherit; text-decoration: none; transition: color 0.15s; }\n  .nav-links a:hover { color: var(--text); }\n  .nav-cta {\n    display: flex; align-items: center; gap: 10px;\n    padding: 9px 16px; background: var(--text); color: var(--bg);\n    border-radius: 8px; font-size: 13.5px; font-weight: 600;\n    text-decoration: none; transition: transform 0.15s;\n  }\n  .nav-cta:hover { transform: translateY(-1px); }\n  .live-dot {\n    width: 7px; height: 7px; border-radius: 50%; background: var(--green);\n    box-shadow: 0 0 0 0 rgba(20,224,122,0.6);\n    animation: pulse 1.6s infinite;\n  }\n  @keyframes pulse {\n    0% { box-shadow: 0 0 0 0 rgba(20,224,122,0.6); }\n    70% { box-shadow: 0 0 0 8px rgba(20,224,122,0); }\n    100% { box-shadow: 0 0 0 0 rgba(20,224,122,0); }\n  }\n\n  /* HERO */\n  .hero {\n    position: relative; z-index: 2;\n    padding: 140px 32px 80px;\n    max-width: 1320px; margin: 0 auto;\n  }\n  .hero-grid {\n    display: grid; grid-template-columns: 1.05fr 1fr; gap: 56px;\n    align-items: start;\n  }\n  .eyebrow {\n    display: inline-flex; align-items: center; gap: 10px;\n    padding: 6px 12px; border: 1px solid var(--border-hi);\n    border-radius: 999px; font-size: 12px;\n    color: var(--text-dim); font-family: 'JetBrains Mono', monospace;\n    letter-spacing: 0.04em; text-transform: uppercase;\n    margin-bottom: 28px;\n  }\n  .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }\n  h1.title {\n    font-family: 'Instrument Serif', 'Inter', serif;\n    font-weight: 400;\n    font-size: clamp(44px, 5.4vw, 80px);\n    line-height: 1.02; letter-spacing: -0.02em;\n    text-wrap: pretty;\n  }\n  h1.title .italic { font-style: italic; color: var(--accent); }\n  h1.title .stroke { -webkit-text-stroke: 1px var(--text); color: transparent; }\n  .hero-sub {\n    margin-top: 28px; max-width: 540px;\n    color: var(--text-dim); font-size: 17px; line-height: 1.6;\n  }\n  .hero-sub b { color: var(--text); font-weight: 600; }\n  .hero-meta {\n    margin-top: 36px; display: flex; gap: 32px; flex-wrap: wrap;\n  }\n  .meta-item .k { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.06em; }\n  .meta-item .v { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-top: 4px; }\n  .meta-item .v.green { color: var(--green); }\n\n  .hero-ctas { margin-top: 40px; display: flex; gap: 12px; flex-wrap: wrap; }\n  .btn {\n    display: inline-flex; align-items: center; gap: 10px;\n    padding: 14px 22px; border-radius: 10px;\n    font-size: 14.5px; font-weight: 600;\n    text-decoration: none; transition: all 0.15s;\n    border: 1px solid transparent; cursor: pointer;\n  }\n  .btn-primary { background: var(--accent); color: #0b1003; }\n  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 30px -10px rgba(197,255,61,0.4); }\n  .btn-ghost { background: transparent; color: var(--text); border-color: var(--border-hi); }\n  .btn-ghost:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.24); }\n\n  /* Hero terminal */\n  .terminal {\n    background: linear-gradient(180deg, rgba(12,14,17,0.92), rgba(8,10,13,0.92));\n    border: 1px solid var(--border-hi);\n    border-radius: 16px;\n    overflow: hidden;\n    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02) inset;\n    backdrop-filter: blur(20px);\n  }\n  .term-bar {\n    display: flex; align-items: center; gap: 8px;\n    padding: 12px 16px; border-bottom: 1px solid var(--border);\n    background: rgba(255,255,255,0.02);\n  }\n  .term-bar .lights { display: flex; gap: 6px; }\n  .term-bar .lights span { width: 11px; height: 11px; border-radius: 50%; background: #2a2d33; }\n  .term-bar .title { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-mute); margin-left: 6px; }\n  .term-bar .badge {\n    margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 11px;\n    color: var(--green); display: flex; align-items: center; gap: 6px;\n  }\n\n  .term-body { display: grid; grid-template-columns: 1fr 1fr; min-height: 480px; }\n\n  /* Monte carlo panel */\n  .mc-panel { padding: 14px 16px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }\n  .panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }\n  .panel-title { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.08em; }\n  .panel-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--green); }\n  #mcCanvas { width: 100%; flex: 1; display: block; border-radius: 6px; }\n  .mc-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }\n  .mc-stat { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; }\n  .mc-stat .lab { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.08em; }\n  .mc-stat .num { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; margin-top: 3px; }\n\n  /* Code panel */\n  .code-panel { display: flex; flex-direction: column; }\n  .code-head { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-mute); }\n  .code-tabs { display: flex; gap: 14px; }\n  .code-tab.active { color: var(--text); }\n  #codeStream {\n    flex: 1; padding: 14px 16px;\n    font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.65;\n    color: #c0c4ca; overflow: hidden; position: relative;\n  }\n  #codeStream .ln { display: block; white-space: pre; }\n  .tk-kw { color: #c5ff3d; }\n  .tk-fn { color: #74e0ff; }\n  .tk-str { color: #ffd082; }\n  .tk-num { color: #ff89a3; }\n  .tk-com { color: #5b5f67; font-style: italic; }\n  .tk-op { color: #8a8e96; }\n  .tk-gn { color: var(--green); }\n  .cursor { display: inline-block; width: 7px; height: 13px; background: var(--green); vertical-align: middle; animation: blink 1s infinite; }\n  @keyframes blink { 50% { opacity: 0; } }\n\n  /* Ticker */\n  .ticker-wrap {\n    position: relative; z-index: 3;\n    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);\n    background: rgba(8,10,13,0.85); backdrop-filter: blur(10px);\n    overflow: hidden; padding: 14px 0;\n  }\n  .ticker {\n    display: flex; gap: 56px; white-space: nowrap;\n    animation: scroll 60s linear infinite;\n    font-family: 'JetBrains Mono', monospace; font-size: 13px;\n  }\n  .ticker .item { display: inline-flex; gap: 10px; align-items: center; color: var(--text-dim); }\n  .ticker .sym { color: var(--text); font-weight: 600; }\n  .ticker .up { color: var(--green); }\n  .ticker .dn { color: var(--red); }\n  @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }\n\n  /* Sections */\n  section { position: relative; z-index: 2; }\n  .container { max-width: 1320px; margin: 0 auto; padding: 0 32px; }\n  .sec-pad { padding: 120px 0; }\n  .sec-head { margin-bottom: 64px; display: flex; justify-content: space-between; align-items: end; gap: 32px; flex-wrap: wrap; }\n  .sec-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; display: block; }\n  .sec-title { font-family: 'Instrument Serif', serif; font-size: clamp(36px, 4vw, 56px); font-weight: 400; line-height: 1.05; letter-spacing: -0.02em; max-width: 720px; text-wrap: balance; }\n  .sec-title .it { font-style: italic; color: var(--accent); }\n  .sec-desc { max-width: 380px; color: var(--text-dim); font-size: 15px; }\n\n  /* Pillars grid */\n  .pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border: 1px solid var(--border); border-radius: 16px; overflow: hidden; background: var(--bg-elev); }\n  .pillar { padding: 36px 32px; border-right: 1px solid var(--border); position: relative; min-height: 320px; display: flex; flex-direction: column; }\n  .pillar:last-child { border-right: none; }\n  .pillar .ix { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-mute); margin-bottom: 24px; letter-spacing: 0.1em; }\n  .pillar .ic { width: 40px; height: 40px; border-radius: 8px; display: grid; place-items: center; background: rgba(197,255,61,0.08); border: 1px solid rgba(197,255,61,0.2); margin-bottom: 24px; }\n  .pillar h3 { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 12px; }\n  .pillar p { color: var(--text-dim); font-size: 14.5px; line-height: 1.6; }\n  .pillar .tag { margin-top: auto; padding-top: 24px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-mute); }\n\n  /* Backtest section */\n  .bt-section { background: var(--bg-elev); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }\n  .bt-grid { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 56px; align-items: center; }\n  .bt-card {\n    border: 1px solid var(--border-hi); border-radius: 16px; overflow: hidden;\n    background: linear-gradient(180deg, rgba(14,16,20,0.95), rgba(8,10,13,0.95));\n    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6);\n  }\n  .bt-card-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }\n  .bt-card-head .tt { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }\n  .bt-card-head .tt span { color: var(--text); }\n  .legend { display: flex; gap: 14px; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-mute); }\n  .legend i { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }\n  #equityCanvas { width: 100%; display: block; height: 360px; }\n  .bt-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-top: 1px solid var(--border); }\n  .bt-metric { padding: 16px 18px; border-right: 1px solid var(--border); }\n  .bt-metric:last-child { border-right: none; }\n  .bt-metric .lab { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.06em; }\n  .bt-metric .num { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; margin-top: 4px; }\n  .bt-metric .num.green { color: var(--green); }\n\n  .bt-info h2 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: clamp(36px, 3.5vw, 52px); line-height: 1.05; letter-spacing: -0.02em; }\n  .bt- at(2, 1fr); }\n    .bt-metric:nth-child(2) { border-right: none; }\n    .nav-links { display: none; }\n    .sec-pad { padding: 80px 0; }\n    .hero { padding: 110px 24px 60px; }\n    .container { padding: 0 24px; }\n    .mod-content { padding: 0 24px 24px; }\n    .mod-head { padding: 18px 22px; grid-template-columns: 40px 1fr auto; gap: 16px; }\n    .pricing-info, .pricing-buy { padding: 36px 28px; }\n    .mod-topics { grid-template-columns: 1fr; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<canvas id=\"matrixCanvas\" class=\"bg-layer\"><\u002Fcanvas>\n<div id=\"gridLayer\" class=\"bg-layer\"><\u002Fdiv>\n<div class=\"vignette\"><\u002Fdiv>\n\n<nav class=\"top\">\n  <div class=\"inner\">\n    <div class=\"brand\">\n      <div class=\"brand-mark\">α<\u002Fdiv>\n      <span>ALGO TRADING<\u002Fspan>\n      <span style=\"color: var(--text-mute); font-family: 'JetBrains Mono', monospace; font-size: 11px; margin-left: 8px;\">// QUANT MENTORSHIP<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"nav-links\">\n      <a href=\"#metodologia\">Metodología<\u002Fa>\n      <a href=\"#backtest\">Backtest<\u002Fa>\n      <a href=\"#formacion\">Formación<\u002Fa>\n      <a href=\"#mentor\">Mentor<\u002Fa>\n      <a href=\"#precio\">Precio<\u002Fa>\n    <\u002Fdiv>\n    <a href=\"#precio\" class=\"nav-cta\">\n      <span class=\"live-dot\"><\u002Fspan>\n      Acceder\n    <\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ====================== HERO ====================== -->\n<section class=\"hero\">\n  <div class=\"hero-grid\">\n    <div>\n      <div class=\"eyebrow\">\n        <span class=\"dot\"><\u002Fspan>\n        <span>Mentoría · Cohorte 2026<\u002Fspan>\n      <\u002Fdiv>\n      <h1 class=\"title\">\n        Desarrollo<br>\n        <span class=\"italic\">Cuantitativo<\u002Fspan><br>\n        <span class=\"stroke\">para Trading<\u002Fspan><br>\n        Algorítmico.\n      <\u002Fh1>\n      <p class=\"hero-sub\">\n        Una formación estructurada para traders e inversores que buscan trascender la subjetividad del análisis tradicional y comprender el mercado como <b>sistema estocástico complejo<\u002Fb> impulsado por liquidez y dinámicas de subasta.\n      <\u002Fp>\n      <div class=\"hero-meta\">\n        <div class=\"meta-item\">\n          <div class=\"k\">Años operando<\u002Fdiv>\n          <div class=\"v\">04+<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta-item\">\n          <div class=\"k\">Sharpe sistema<\u002Fdiv>\n          <div class=\"v green\">2.41<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta-item\">\n          <div class=\"k\">Módulos<\u002Fdiv>\n          <div class=\"v\">06<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta-item\">\n          <div class=\"k\">Cohorte<\u002Fdiv>\n          <div class=\"v\">Q2'26<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hero-ctas\">\n        <a href=\"#precio\" class=\"btn btn-primary\">\n          Acceder a la formación\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n        <a href=\"#metodologia\" class=\"btn btn-ghost\">Ver metodología<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Terminal -->\n    <div class=\"terminal\">\n      <div class=\"term-bar\">\n        <div class=\"lights\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>\n        <div class=\"title\">~/quant-lab — monte_carlo.py<\u002Fdiv>\n        <div class=\"badge\"><span class=\"live-dot\"><\u002Fspan>LIVE<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"term-body\">\n        <div class=\"mc-panel\">\n          <div class=\"panel-head\">\n            <div class=\"panel-title\">Monte Carlo · Equity Curves<\u002Fdiv>\n            <div class=\"panel-val\" id=\"mcCount\">n = 0 / 500<\u002Fdiv>\n          <\u002Fdiv>\n          <canvas id=\"mcCanvas\"><\u002Fcanvas>\n          <div class=\"mc-stats\">\n            <div class=\"mc-stat\">\n              <div class=\"lab\">Median DD<\u002Fdiv>\n              <div class=\"num\" id=\"ddMed\" style=\"color: var(--red);\">-12.4%<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"mc-stat\">\n              <div class=\"lab\">Win Rate<\u002Fdiv>\n              <div class=\"num\" id=\"winRate\" style=\"color: var(--green);\">61.8%<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"mc-stat\">\n              <div class=\"lab\">CAGR p50<\u002Fdiv>\n              <div class=\"num\" id=\"cagr\" style=\"color: var(--green);\">+38.4%<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"code-panel\">\n          <div class=\"code-head\">\n            <div class=\"code-tabs\">\n              <span class=\"code-tab active\">strategy.py<\u002Fspan>\n              <span class=\"code-tab\">risk.py<\u002Fspan>\n              <span class=\"code-tab\">execution.ts<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div id=\"codeStream\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====================== TICKER ====================== -->\n<div class=\"ticker-wrap\">\n  <div class=\"ticker\" id=\"ticker\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ====================== PILLARS ====================== -->\n<section class=\"sec-pad\" id=\"metodologia\">\n  <div class=\"container\">\n    <div class=\"sec-head\">\n      <div>\n        <span class=\"sec-eyebrow\">01 — Metodología<\u002Fspan>\n        <h2 class=\"sec-title\">Tres pilares para una <span class=\"it\">ventaja estadística<\u002Fspan> verificable.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"sec-desc\">Cada decisión operativa converge desde tres dominios distintos: estructura macro, lectura cuantitativa y gestión asimétrica del riesgo.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"pillars\">\n      <div class=\"pillar\">\n        <div class=\"ix\">I — 01 / 03<\u002Fdiv>\n        <div class=\"ic\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#c5ff3d\" stroke-width=\"1.8\"><path d=\"M3 17l6-6 4 4 8-8\"><\u002Fpath><path d=\"M14 7h7v7\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Arquitectura de Alpha y Modelado de Estrategias<\u002Fh3>\n        <p>Traducción de ineficiencias matemáticas y anomalías de la microestructura del mercado en sistemas de reglas absolutas. Desde la formulación de la hipótesis estadística hasta su codificación impecable en entornos profesionales como <b>PowerLanguage<\u002Fb> o <b>Python<\u002Fb>, garantizando lógica robusta y libre de <b>look-ahead bias<\u002Fb>.<\u002Fp>\n        <div class=\"tag\">// HYPOTHESIS · LOGIC · POWERLANGUAGE · PYTHON<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"ix\">II — 02 / 03<\u002Fdiv>\n        <div class=\"ic\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#c5ff3d\" stroke-width=\"1.8\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M3 9h18M9 3v18\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Auditoría Cuantitativa y Pruebas de Estrés<\u002Fh3>\n        <p>Aplicación rigurosa de metodologías científicas para la destrucción del <b>curve-fitting<\u002Fb>. Protocolos <b>Out-of-Sample<\u002Fb>, optimizaciones <b>Walk-Forward<\u002Fb> e inclusión de fricción extrema (slippage y comisiones) evalúan la supervivencia real del algoritmo. Incluye auditoría de rachas vía <b>Z-score<\u002Fb> para certificar la independencia estadística del sistema.<\u002Fp>\n        <div class=\"tag\">// OOS · WALK-FORWARD · Z-SCORE · STRESS TEST<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"ix\">III — 03 / 03<\u002Fdiv>\n        <div class=\"ic\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#c5ff3d\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 3\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Asignación Dinámica de Capital y Ejecución Institucional<\u002Fh3>\n        <p>Transición del laboratorio algorítmico al despliegue real. Implementación de <b>Position Sizing<\u002Fb> paramétrico para escalar capital según volatilidad, junto con infraestructuras de <b>latencia ultrabaja<\u002Fb> y conexiones a flujos institucionales (<b>Rithmic<\u002Fb>) para que la ejecución en vivo replique con exactitud las proyecciones del backtest.<\u002Fp>\n        <div class=\"tag\">// SIZING · LOW-LATENCY · RITHMIC · LIVE DEPLOY<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====================== BACKTEST ====================== -->\n<section class=\"sec-pad bt-section\" id=\"backtest\">\n  <div class=\"container\">\n    <div class=\"bt-grid\">\n      <div class=\"bt-info\">\n        <span class=\"sec-eyebrow\">02 — Evidencia<\u002Fspan>\n        <h2>Equity curves <span class=\"it\">shuffled<\u002Fspan>,<br>no anécdotas.<\u002Fh2>\n        <p>Cada estrategia se valida bajo 500+ simulaciones Monte Carlo, mezclando el orden cronológico de los trades para aislar la edge real de la suerte secuencial. Lo que ves a la derecha es la distribución de equity curves posibles del sistema base.<\u002Fp>\n        <ul class=\"bt-list\">\n          <li>\n            Shuffled Trades Analysis\n            <small>Distribución estadística de equity curves sobre N permutaciones aleatorias.<\u002Fsmall>\n          <\u002Fli>\n          <li>\n            Drawdown asimétrico\n            <small>Worst-case escenario p99 modelado antes de capital real en mercado.<\u002Fsmall>\n          <\u002Fli>\n          <li>\n            Edge expectancy\n            <small>Expectancy &gt; 0 sostenida en out-of-sample, no curve fitting in-sample.<\u002Fsmall>\n          <\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n hs\n  const STEPS = 120;\n  const paths = [];\n  let medianPath = null;\n  let count = 0;\n\n  // generate one geometric brownian-ish path with positive drift\n  function genPath() {\n    const p = new Array(STEPS);\n    p[0] = 0;\n    const drift = 0.0028 + Math.random() * 0.0015;\n    const vol = 0.018 + Math.random() * 0.01;\n    for (let i = 1; i < STEPS; i++) {\n      const z = (Math.random() + Math.random() + Math.random() - 1.5) * 1.5;\n      p[i] = p[i-1] + drift + vol * z;\n    }\n    return p;\n  }\n  // build median from all paths\n  function buildMedian() {\n    const arr = new Array(STEPS);\n    for (let s = 0; s < STEPS; s++) {\n      const vals = paths.map(pp => pp[s]).sort((a,b) => a-b);\n      arr[s] = vals[Math.floor(vals.length/2)];\n    }\n    return arr;\n  }\n\n  function drawAll() {\n    fit();\n    ctx.clearRect(0, 0, W, H);\n    // grid\n    ctx.strokeStyle = 'rgba(255,255,255,0.04)';\n    ctx.lineWidth = 1;\n    for (let i = 0; i <= 4; i++) {\n      const y = (H * i) / 4;\n      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();\n    }\n    for (let i = 0; i <= 6; i++) {\n      const x = (W * i) / 6;\n      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();\n    }\n    // determine y range\n    let lo = Infinity, hi = -Infinity;\n    for (const p of paths) {\n      for (const v of p) { if (v < lo) lo = v; if (v > hi) hi = v; }\n    }\n    if (!isFinite(lo)) { lo = -0.2; hi = 0.5; }\n    const pad = (hi - lo) * 0.1 || 0.1;\n    lo -= pad; hi += pad;\n\n    // zero line\n    const yZero = H - ((0 - lo) / (hi - lo)) * H;\n    ctx.strokeStyle = 'rgba(255,255,255,0.15)';\n    ctx.setLineDash([3, 4]);\n    ctx.beginPath(); ctx.moveTo(0, yZero); ctx.lineTo(W, yZero); ctx.stroke();\n    ctx.setLineDash([]);\n\n    // draw paths\n    for (let pi = 0; pi < paths.length; pi++) {\n      const p = paths[pi];\n      const endVal = p[p.length-1];\n      const isWorst = pi === 0 && endVal < 0;\n      const color = endVal >= 0 ? 'rgba(20,224,122,0.18)' : 'rgba(255,77,94,0.22)';\n      ctx.strokeStyle = color;\n      ctx.lineWidth = 1;\n      ctx.beginPath();\n      for (let s = 0; s < p.length; s++) {\n        const x = (s / (STEPS-1)) * W;\n        const y = H - ((p[s] - lo) / (hi - lo)) * H;\n        if (s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);\n      }\n      ctx.stroke();\n    }\n\n    // median\n    if (medianPath) {\n      ctx.strokeStyle = '#c5ff3d';\n      ctx.lineWidth = 2;\n      ctx.shadowBlur = 8; ctx.shadowColor = '#c5ff3d';\n      ctx.beginPath();\n      for (let s = 0; s < medianPath.length; s++) {\n        const x = (s / (STEPS-1)) * W;\n        const y = H - ((medianPath[s] - lo) / (hi - lo)) * H;\n        if (s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);\n      }\n      ctx.stroke();\n      ctx.shadowBlur = 0;\n    }\n  }\n\n  let active = null; // path currently being drawn\n  let activeStep = 0;\n  function tick() {\n    if (!active) {\n      active = genPath();\n      activeStep = 0;\n    }\n    activeStep += 4;\n    if (activeStep >= STEPS) {\n      paths.push(active);\n      if (paths.length > N) paths.shift();\n      medianPath = buildMedian();\n      active = null;\n      count = Math.min(500, count + Math.floor(Math.random() * 5 + 3));\n      const el = document.getElementById('mcCount');\n      if (el) el.textContent = 'n = ' + count + ' / 500';\n      if (count >= 500) count = 0;\n    }\n    // include the in-progress path\n    const renderList = [...paths];\n    if (active) {\n      renderList.push(active.slice(0, activeStep));\n    }\n    // temp swap for drawing\n    const orig = paths.slice();\n    paths.length = 0;\n    Array.prototype.push.apply(paths, renderList);\n    drawAll();\n    paths.length = 0;\n    Array.prototype.push.apply(paths, orig);\n\n    setTimeout(() => requestAnimationFrame(tick), 22);\n  }\n  // seed\n  for (let i = 0; i < 12; i++) paths.push(genPath());\n  medianPath = buildMedian();\n  fit();\n  window.addEventListener('resize', fit);\n  tick();\n})();\n\n/* ====================== CODE STREAM ====================== */\n(function() {\n  const el = document.getElementById('codeStream');\n  const lines = [\n    ['<span class=\"tk-com\"># strategy.py — quant_mentorship<\u002Fspan>'],\n    ['<span class=\"tk-kw\">import<\u002Fspan> numpy <span class=\"tk-kw\">as<\u002Fspan> np'],\n    ['<span class=\"tk-kw\">import<\u002Fspan> pandas <span class=\"tk-kw\">as<\u002Fspan> pd'],\n    ['<span class=\"tk-kw\">from<\u002Fspan> scipy.stats <span class=\"tk-kw\">import<\u002Fspan> norm, t'],\n    [''],\n    ['<span class=\"tk-kw\">def<\u002Fspan> <span class=\"tk-fn\">monte_carlo<\u002Fspan>(trades, n_sim=<span class=\"tk-num\">500<\u002Fspan>):'],\n    ['    <span class=\"tk-com\"># shuffle trade sequence<\u002Fspan>'],\n    ['    paths = []'],\n    ['    <span class=\"tk-kw\">for<\u002Fspan> _ <span class=\"tk-kw\">in<\u002Fspan> <span class=\"tk-fn\">range<\u002Fspan>(n_sim):'],\n    ['        seq = np.random.<span class=\"tk-fn\">permutation<\u002Fspan>(trades)'],\n    ['        equity = np.<span class=\"tk-fn\">cumsum<\u002Fspan>(seq)'],\n    ['        paths.<span class=\"tk-fn\">append<\u002Fspan>(equity)'],\n    ['    <span class=\"tk-kw\">return<\u002Fspan> np.<span class=\"tk-fn\">array<\u002Fspan>(paths)'],\n    [''],\n    ['<span class=\"tk-kw\">def<\u002Fspan> <span class=\"tk-fn\">expectancy<\u002Fspan>(wins, losses, p):'],\n    ['    <span class=\"tk-kw\">return<\u002Fspan> (p * wins) - ((<span class=\"tk-num\">1<\u002Fspan>-p) * losses)'],\n    [''],\n    ['<span class=\"tk-com\"># load MNQ tick data<\u002Fspan>'],\n    ['df = pd.<span class=\"tk-fn\">read_parquet<\u002Fspan>(<span class=\"tk-str\">\"mnq_2024.parquet\"<\u002Fspan>)'],\n    ['signals = <span class=\"tk-fn\">decode_orderflow<\u002Fspan>(df)'],\n    ['trades  = <span class=\"tk-fn\">execute<\u002Fspan>(signals, risk=<span class=\"tk-num\">0.5<\u002Fspan>)'],\n    [''],\n    ['<span class=\"tk-com\"># run simulation<\u002Fspan>'],\n    ['paths = <span class=\"tk-fn\">monte_carlo<\u002Fspan>(trades, n_sim=<span class=\"tk-num\">500<\u002Fspan>)'],\n    ['p50   = np.<span class=\"tk-fn\">median<\u002Fspan>(paths[:, -<span class=\"tk-num\">1<\u002Fspan>])'],\n    ['p05   = np.<span class=\"tk-fn\">percentile<\u002Fspan>(paths[:, -<span class=\"tk-num\">1<\u002Fspan>], <span class=\"tk-num\">5<\u002Fspan>)'],\n    [''],\n    ['<span class=\"tk-fn\">print<\u002Fspan>(<span class=\"tk-str\">f\"net_p50 = ${p50:,.0f}\"<\u002Fspan>)'],\n    ['<span class=\"tk-com\">>>> <\u002Fspan><span class=\"tk-gn\">net_p50 = $84,213<\u002Fspan>'],\n    ['<span class=\"tk-com\">>>> <\u002Fspan><span class=\"tk-gn\">sharpe  = 2.41<\u002Fspan>'],\n    ['<span class=\"tk-com\">>>> <\u002Fspan><span class=\"tk-gn\">max_dd  = -9.8%<\u002Fspan>'],\n    ['<span class=\"tk-com\">>>> <\u002Fspan><span class=\"tk-gn\">edge confirmed ✓<\u002Fspan>'],\n  ];\n\n  let pointer = 0;\n  let buffer = [];\n\n  function render() {\n    el.innerHTML = buffer.map(b => '<span class=\"ln\">' + b + '<\u002Fspan>').join('') + '<span class=\"cursor\"><\u002Fspan>';\n    el.scrollTop = el.scrollHeight;\n  }\n\n  function step() {\n    buffer.push(lines[pointer][0]);\n    if (buffer.length > 18) buffer.shift();\n    pointer = (pointer + 1) % lines.length;\n    if (pointer === 0) {\n      setTimeout(() => { buffer = []; step(); }, 1200);\n      render();\n      return;\n    }\n    render();\n    const isComment = lines[pointer-1][0].includes('tk-com');\n    const isEmpty = lines[pointer-1][0] === '';\n    const delay = isEmpty ? 200 : isComment ? 380 : 280 + Math.random() * 220;\n    setTimeout(step, delay);\n  }\n  step();\n})();\n\n/* ====================== TICKER ====================== */\n(function() {\n  const symbols = [\n    ['MNQ', 24187.5, +0.84],\n    ['ES',  6042.25, +0.32],\n    ['NQ',  24180.5, +0.91],\n    ['CL',  72.18, -1.24],\n    ['GC',  3402.4, +0.58],\n    ['BTC', 102487, +2.41],\n    ['ETH', 4218, +1.87],\n    ['DXY', 104.21, -0.18],\n    ['10Y', 4.318, +0.04],\n    ['VIX', 14.82, -3.21],\n    ['SPX', 6042, +0.41],\n    ['EUR/USD', 1.0842, +0.12],\n    ['USD/JPY', 152.81, -0.24],\n    ['GBP/USD', 1.2641, +0.18],\n  ];\n  const ticker = document.getElementById('ticker');\n  function row() {\n    return symbols.map(([s, p, c]) => {\n      const cls = c >= 0 ? 'up' : 'dn';\n      const arr = c >= 0 ? '▲' : '▼';\n      const pStr = p >= 1000 ? p.toLocaleString('en-US', {maximumFractionDigits: 2}) : p.toFixed(4);\n      return `<span class=\"item\"><span class=\"sym\">${s}<\u002Fspan><span>${pStr}<\u002Fspan><span class=\"${cls}\">${arr} ${Math.abs(c).toFixed(2)}%<\u002Fspan><\u002Fspan>`;\n    }).join('');\n  }\n  ticker.innerHTML = row() + row();\n})();\n\n/* ====================== EQUITY CURVES ====================== */\n(function() {\n  const cvs = document.getElementById('equityCanvas');\n  if (!cvs) return;\n  const ctx = cvs.getContext('2d');\n  let W, H;\n  function fit() {\n    const r = cvs.getBoundingClientRect();\n    cvs.width = r.width * devicePixelRatio;\n    cvs.height = 360 * devicePixelRatio;\n    cvs.style.height = '360px';\n    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);\n    W = r.width; H = 360;\n  }\n  const N_SIM = 120;\n  const STEPS = 220;\n  const sims = [];\n  let phase = 0;\n\n  function genSim() {\n    const p = [0];\n    const drift = 0.018 + Math.random() * 0.008;\n    const vol = 0.32 + Math.random() * 0.15;\n    for (let i = 1; i < STEPS; i++) {\n      const z = (Math.random() + Math.random() + Math.random() - 1.5) * 1.7;\n      p.push(p[i-1] + drift + vol * z);\n    }\n    return p;\n  }\n  for (let i = 0; i < N_SIM; i++) sims.push(genSim());\n\n  // compute median + worst\n  const medianPath = new Array(STEPS);\n  const worstPath = new Array(STEPS);\n  for (let s = 0; s < STEPS; s++) {\n    const vals = sims.map(p => p[s]).sort((a,b) => a-b);\n    medianPath[s] = vals[Math.floor(vals.length/2)];\n    worstPath[s] = vals[Math.floor(vals.length * 0.05)];\n  }\n\n  function draw() {\n    fit();\n    ctx.clearRect(0, 0, W, H);\n    // grid\n    ctx.strokeStyle = 'rgba(255,255,255,0.04)';\n    ctx.lineWidth = 1;\n    for (let i = 0; i <= 5; i++) {\n      const y = (H * i) / 5;\n      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();\n    }\n    for (let i = 0; i <= 8; i++) {\n      const x = (W * i) / 8;\n      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();\n    }\n\n    let lo = Infinity, hi = -Infinity;\n    for (const p of sims) for (const v of p) { if (v < lo) lo = v; if (v > hi) hi = v; }\n    const pad = (hi - lo) * 0.08;\n    lo -= pad; hi += pad;\n\n    const yZero = H - ((0 - lo) / (hi - lo)) * H;\n    ctx.strokeStyle = 'rgba(255,255,255,0.12)';\n    ctx.setLineDash([4, 4]);\n    ctx.beginPath(); ctx.moveTo(0, yZero); ctx.lineTo(W, yZero); ctx.stroke();\n    ctx.setLineDash([]);\n\n    // animated reveal — only draw up to phase\n    const cutoff = Math.min(STEPS, phase);\n\n    // draw all sims\n    for (const p of sims) {\n      const endVal = p[p.length-1];\n      const color = endVal >= 0 ? 'rgba(20,224,122,0.18)' : 'rgba(255,77,94,0.18)';\n      ctx.strokeStyle = color;\n      ctx.lineWidth = 1;\n      ctx.beginPath();\n      for (let s = 0; s < cutoff; s++) {\n        const x = (s / (STEPS-1)) * W;\n        const y = H - ((p[s] - lo) / (hi - lo)) * H;\n        if (s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);\n      }\n      ctx.stroke();\n    }\n\n    // worst path\n    ctx.strokeStyle = 'rgba(255,77,94,0.85)';\n    ctx.lineWidth = 1.5;\n    ctx.beginPath();\n    for (let s = 0; s < cutoff; s++) {\n      const x = (s / (STEPS-1)) * W;\n      const y = H - ((worstPath[s] - lo) / (hi - lo)) * H;\n      if (s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);\n    }\n    ctx.stroke();\n\n    // median path\n    ctx.strokeStyle = '#c5ff3d';\n    ctx.lineWidth = 2.4;\n    ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(197,255,61,0.6)';\n    ctx.beginPath();\n    for (let s = 0; s < cutoff; s++) {\n      const x = (s / (STEPS-1)) * W;\n      const y = H - ((medianPath[s] - lo) / (hi - lo)) * H;\n      if (s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);\n    }\n    ctx.stroke();\n    ctx.shadowBlur = 0;\n\n    // axis labels\n    ctx.fillStyle = '#5b5f67';\n    ctx.font = '10px JetBrains Mono, monospace';\n    ctx.fillText('0', 6, yZero - 4);\n    ctx.fillText('Trades →', W - 70, H - 6);\n  }\n\n  function loop() {\n    phase += 2.5;\n    if (phase > STEPS + 60) phase = 0;\n    draw();\n    requestAnimationFrame(loop);\n  }\n  loop();\n  window.addEventListener('resize', () => { phase = STEPS; draw(); });\n})();\n\n/* ====================== MODULES ====================== */\n(function() {\n  const data = [\n    {\n      label: 'Intro',\n      t: 'Introducción al Trading Algorítmico',\n      d: 'Qué es operar el mercado con código, dónde se gana la ventaja real y cómo cambia el juego cuando la IA acompaña tu research y programación.',\n      topics: [\n        'Qué es el trading algorítmico',\n        'Integración de Inteligencia Artificial en el Modelado y Research',\n        'Ventaja Competitiva: Ejecución Sistemática vs. Flujo Discrecional',\n        'Infraestructura Tecnológica: Lenguajes de Programación de Alto Rendimiento'\n      ]\n    },\n    {\n      label: '01',\n      t: 'Fundamentos Cuantitativos',\n      d: 'La base matemática y estadística del sistema: series de tiempo, retornos, métricas de evaluación y los sesgos que destruyen estrategias antes de empezar.',\n      topics: [\n        'Matemáticas Financieras Aplicadas al Trading',\n        'Análisis de Series Temporales (Time Series Analysis)',\n        'Distribución de Retornos y Análisis de Volatilidad Estocástica',\n        'Comportamiento del Precio: Modelos Estacionarios vs. Caminos Aleatorios',\n        'Análisis de Autocorrelación (ACF / PACF) en Estructuras de Precio',\n        'Introducción al Modelado Econométrico',\n        'Simulación Monte Carlo',\n        'Métricas: Sharpe, Sortino, Profit Factor, Alpha/Beta, Z-Score',\n        'Neutralización de Sesgos Estadísticos: Look-ahead y Survivorship Bias'\n      ]\n    },\n    {\n      label: '02',\n      t: 'Herramientas y Estrategias',\n      d: 'El stack del cuant moderno: hardware, MultiCharts, conexión institucional de datos y el menú completo de familias de estrategia que vas a poder construir.',\n      topics: [\n        'Hardware y requisitos mínimos',\n        'Despliegue de Entornos de Pruebas: Plataforma MultiCharts',\n        'Enrutamiento de Datos Institucionales (Data Feeds vía Rithmic)',\n        'Arquitectura y Sintaxis de Código',\n        'Lógica de Señales de Ejecución (Signals)',\n        'Programación de Indicadores Cuantitativos',\n        'Desarrollo de Funciones Personalizadas',\n        'Estrategias: Breakout · Momentum · Mean Reversion',\n        'Estrategias: Trend Following · Statistical Arbitrage',\n        'Ingeniería Inversa de Papers Académicos y Generación de Hipótesis',\n        'Planteamiento y Definición de la Primera Hipótesis Algorítmica'\n      ]\n    },\n    {\n      label: '03',\n      t: 'De Idea a Código',\n      d: 'El proceso de traducción: cómo bajar una hipótesis a inputs, lógica y reglas que la máquina ejecuta sin ambigüedad — y cómo depurar cuando algo no cuadra.',\n      topics: [\n        'Parametrización Dinámica: Definición de Inputs y Variables',\n        'Arquitectura de Ejecución: Lógica de Entrada (Entry Mechanics)',\n        'Mecanismos de Salida Sistemática (Exit Logic & Trailing)',\n        'Modelado de Riesgo y Position Sizing Algorítmico',\n        'Desarrollo e Implementación de Indicadores Personalizados',\n        'Arquitectura de Desarrollo Ágil e Incremental',\n        'Auditoría Lógica y Validación de Parámetros',\n        'Protocolos de Debugging y Resolución de Anomalías',\n        'Principios de Robustez: La Importancia de la Simplicidad Algorítmica'\n      ]\n    },\n    {\n      label: '04',\n      t: 'Backtesting y Optimización',\n      d: 'La fase científica: validar la edge sin engañarte. In-sample, out-of-sample, Monte Carlo y los protocolos para no caer en overfitting.',\n      topics: [\n        'Validación Histórica (Backtesting) de Alta Precisión',\n        'Muestreo y Calibración de Datos In-Sample (IS)',\n        'Pruebas de Validación Ciega Out-of-Sample (OOS)',\n        'Stress Testing Cuantitativo mediante Monte Carlo',\n        'Optimización de Superficies de Parámetros',\n        'Identificación y Prevención del Sobreajuste (Overfitting / Curve-fitting)',\n        'Métricas Avanzadas de Evaluación Sistemática',\n        'Análisis Dinámico de Robustez (Walk-Forward Analysis)'\n      ]\n    },\n    {\n      label: '05',\n      t: 'Ejecución Real',\n      d: 'Del laboratorio al mercado vivo: conexión con prop firm, manejo del slippage, escalado de posiciones y gestión real del riesgo cuando el dinero ya es tuyo.',\n      topics: [\n        'Integración API e Infraestructura de Fondeo (Apex / Prop Firms)',\n        'Transición Operativa: Ejecución en Mercado Real (Live Deployment)',\n        'Fricción Microestructural: Análisis de Slippage vs. Backtest',\n        'Gestión Dinámica de Riesgo Operativo en Tiempo Real',\n        'Modelos Institucionales de Escalado de Posiciones (Pyramiding)',\n        'Especificaciones Técnicas y Nocionales de Contratos Financieros'\n      ]\n    },\n  ];\n\n  const wrap = document.getElementById('modules');\n  wrap.innerHTML = data.map((m, i) => {\n    const isIntro = m.label === 'Intro';\n    const labelHtml = isIntro\n      ? '<span style=\"color: var(--accent); font-weight: 600;\">INTRO<\u002Fspan>'\n      : 'M&Oacute;DULO ' + m.label;\n    return `\n    <div class=\"module\" data-i=\"${i}\">\n      <div class=\"mod-head\">\n        <div class=\"mod-num\" style=\"min-width: 96px;\">${labelHtml}<\u002Fdiv>\n        <div class=\"mod-title\">${m.t}<\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 18px;\">\n          <div class=\"mod-meta\">${m.topics.length} temas<\u002Fdiv>\n          <div class=\"chev\"><svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 9l6 6 6-6\" stroke=\"#e8e9eb\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mod-body\"><div>\n        <div class=\"mod-content\">\n          <p>${m.d}<\u002Fp>\n          <ul class=\"mod-topics\">\n            ${m.topics.map(t => `<li>${t}<\u002Fli>`).join('')}\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  `;}).join('');\n\n  wrap.addEventListener('click', (e) => {\n    const head = e.target.closest('.mod-head');\n    if (!head) return;\n    const mod = head.parentElement;\n    mod.classList.toggle('open');\n  });\n  // open first\n  wrap.firstElementChild.classList.add('open');\n})();\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
